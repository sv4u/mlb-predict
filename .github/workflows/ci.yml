name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff check + format
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------------
  # Type check — mypy on source package only
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: mypy
        run: uv run mypy src/winprob

  # ---------------------------------------------------------------------------
  # Tests — pytest across Python 3.11 and 3.12
  # ---------------------------------------------------------------------------
  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: pytest
        run: uv run pytest tests/ -v --tb=short
